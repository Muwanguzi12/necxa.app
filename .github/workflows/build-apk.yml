name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ── Free up disk space (~10GB) before heavy Flutter/FFmpeg build ──
    - name: Free disk space
      run: |
        echo "=== Disk before cleanup ==="
        df -h
        sudo rm -rf /usr/local/lib/android/sdk/emulator
        sudo rm -rf /usr/local/lib/android/sdk/system-images
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /opt/hostedtoolcache/go
        sudo rm -rf /opt/hostedtoolcache/node
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/.ghcup
        sudo apt-get clean
        docker image prune -af || true
        echo "=== Disk after cleanup ==="
        df -h

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.6'
        channel: 'stable'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK Release (split per ABI)
      run: flutter build apk --release --split-per-abi

    - name: Upload Release APKs
      uses: actions/upload-artifact@v4
      with:
        name: necxa-apk-release
        path: build/app/outputs/flutter-apk/app-*-release.apk
        retention-days: 30
