name: Engagement Service CI

on:
  push:
    branches: [ 'feature/engagement-service-skeleton', 'feature/*', 'main' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB_NAME: ${{ secrets.MONGO_ENGAGEMENT_DB }}
      SUPABASE_AUTH_URLS: ${{ secrets.SUPABASE_AUTH_URLS }}
      SUPABASE_AUTH_PUBLISHABLE_KEYS: ${{ secrets.SUPABASE_AUTH_PUBLISHABLE_KEYS }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/engagement-service/package-lock.json

      - name: Install dependencies
        run: |
          cd services/engagement-service
          npm ci --no-audit --no-fund

      - name: Build (TypeScript)
        run: |
          cd services/engagement-service
          npm run build

      - name: Run Mongo migration / index check (short timeout)
        run: |
          cd services/engagement-service
          npm run ci:mongo-check

      - name: Run tests
        run: |
          cd services/engagement-service
          npm test
